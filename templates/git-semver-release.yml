---
spec:
  inputs:
    stage:
      type: string
      default: test
      description: 'Pipeline stage for the job'
    version:
      type: string
      default: latest
      description: 'Version of the git-semver-release Docker image to use'
    command:
      type: string
      default: version
      description: 'Command to run: version, major, minor, patch, or conventional'
      options:
        - version
        - major
        - minor
        - patch
        - conventional
    push:
      type: boolean
      default: false
      description: 'Push the created tag to the origin remote'
    channel:
      type: string
      default: ''
      description: 'Create a pre-release tag with the given channel (e.g. alpha, beta, rc)'
    message:
      type: string
      default: ''
      description: 'Annotation message for the tag (supports $version placeholder)'
---
'git-semver-release':
  image:
    name: 'ghcr.io/michalstutzmann/git-semver-release:$[[ inputs.version ]]'
    entrypoint: ['']
  stage: $[[ inputs.stage ]]
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  script:
    - |
      args=()

      command="$[[ inputs.command ]]"
      args+=("$command")

      if [ "$[[ inputs.push ]]" = "true" ]; then
        args+=("--push")
      fi

      channel="$[[ inputs.channel ]]"
      if [ -n "$channel" ]; then
        args+=("--channel" "$channel")
      fi

      message="$[[ inputs.message ]]"
      if [ -n "$message" ]; then
        args+=("$message")
      fi

      version=$(git-semver-release "${args[@]}")
      printf 'VERSION=%s\n' "$version" >> version.env
      printf '%s\n' "$version"
  artifacts:
    reports:
      dotenv: version.env
