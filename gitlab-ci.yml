# GitLab CI template for Git SemVer Release
#
# Usage in .gitlab-ci.yml:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/michalstutzmann/git-semver-release/main/gitlab-ci.yml'
#
#   release:
#     extends: .git-semver-release
#     variables:
#       GSR_COMMAND: "conventional"
#       GSR_PUSH: "true"
#
# The calculated version is available as:
#   - dotenv artifact: $VERSION (for downstream jobs)
#   - job output on stdout

.git-semver-release:
  image: alpine:latest
  before_script:
    - apk add --no-cache bash git curl
    - curl -fsSL "$GSR_SCRIPT_URL" -o /usr/local/bin/git-semver-release
    - chmod +x /usr/local/bin/git-semver-release
  variables:
    GSR_COMMAND: "version"
    GSR_PUSH: "false"
    GSR_CHANNEL: ""
    GSR_MESSAGE: ""
    GSR_SCRIPT_URL: "https://raw.githubusercontent.com/michalstutzmann/git-semver-release/main/git-semver-release"
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  script:
    - |
      args=()

      args+=("$GSR_COMMAND")

      if [ "$GSR_PUSH" = "true" ]; then
        args+=("--push")
      fi

      if [ -n "$GSR_CHANNEL" ]; then
        args+=("--channel" "$GSR_CHANNEL")
      fi

      if [ -n "$GSR_MESSAGE" ]; then
        args+=("$GSR_MESSAGE")
      fi

      version=$(git-semver-release "${args[@]}")
      printf 'VERSION=%s\n' "$version" >> version.env
      printf '%s\n' "$version"
  artifacts:
    reports:
      dotenv: version.env
