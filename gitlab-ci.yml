# GitLab CI component for Git SemVer Release
#
# Usage in .gitlab-ci.yml:
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/<owner>/git-semver-release/main/gitlab-ci.yml'
#   # or
#     - component: gitlab.com/<namespace>/git-semver-release@main
#
#   release:
#     extends: .git-semver-release
#     variables:
#       GSR_COMMAND: "release"
#       GSR_PUSH: "true"
#
# The calculated version is available as:
#   - dotenv artifact: $VERSION (for downstream jobs)
#   - job output on stdout

.git-semver-release:
  image: alpine:latest
  before_script:
    - apk add --no-cache bash git
  variables:
    GSR_COMMAND: "version"
    GSR_PUSH: "false"
    GSR_CHANNEL: ""
    GSR_MESSAGE: ""
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  script:
    - chmod +x "${CI_PROJECT_DIR}/git-semver-release"
    - export PATH="${CI_PROJECT_DIR}:${PATH}"
    - |
      args=()

      if [ "$GSR_COMMAND" != "release" ]; then
        args+=("$GSR_COMMAND")
      fi

      if [ "$GSR_PUSH" = "true" ]; then
        args+=("--push")
      fi

      if [ -n "$GSR_CHANNEL" ]; then
        args+=("--channel" "$GSR_CHANNEL")
      fi

      if [ -n "$GSR_MESSAGE" ]; then
        args+=("$GSR_MESSAGE")
      fi

      version=$(git-semver-release "${args[@]}")
      printf 'VERSION=%s\n' "$version" >> version.env
      printf '%s\n' "$version"
  artifacts:
    reports:
      dotenv: version.env
